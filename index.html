        // Función para abrir el modal
        function mostrarTitulo(numero) {
            const titulo = titulos[numero] || "Título no disponible";
            document.getElementById('numero-discurso').innerText = "Discurso " + numero;
            document.getElementById('texto-discurso').innerText = titulo;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // Función para cerrar el modal
        function cerrarModal() {
            const modal = document.getElementById('modal-titulo');
            modal.classList.add('hidden');
